<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Your Surprise ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#ff4d6d,#ff8fab,#ffc2d1);
overflow:hidden;
padding:20px;
position:relative;
}

/* Floating Hearts */

.heart{
position:absolute;
bottom:-30px;
font-size:25px;
animation:floatUp linear infinite;
opacity:.8;
}

@keyframes floatUp{

0%{
transform:translateY(0) scale(.6);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.4);
opacity:0;
}

}

.card{

width:100%;
max-width:350px;

background:rgba(255,255,255,.2);

backdrop-filter:blur(20px);

border-radius:25px;

padding:25px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,.2);

z-index:2;

animation:fade .8s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h1{

font-size:28px;

color:white;

margin-bottom:10px;

}

p{

color:white;

margin-bottom:20px;

font-size:18px;

}

img{

width:260px;

max-width:100%;

cursor:pointer;

animation:bounce 2s infinite;

transition:.3s;

}

img:hover{

transform:scale(1.08);

}

@keyframes bounce{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-15px);
}

}

.tap{

margin-top:18px;

font-size:18px;

font-weight:bold;

color:white;

animation:blink 1s infinite;

}

@keyframes blink{

50%{
opacity:.4;
}

}

@media(max-width:480px){

.card{

max-width:330px;

padding:22px;

}

img{

width:220px;

}

h1{

font-size:24px;

}

}

</style>

</head>

<body>

<div class="card">

<h1>Congratulations! ❤️</h1>

<p>Your surprise is waiting...</p>

<img src="giphy.gif" onclick="openLetter()" alt="Bouquet">

<div class="tap">💐 Tap the Bouquet 💐</div>

</div>

<script>

function openLetter(){

window.location.href="message.html";

}

// Floating Hearts

setInterval(function(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

},400);

</script>

</body>
</html>
