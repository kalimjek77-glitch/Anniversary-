<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>For My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4d6d,#ff8fab,#ffd6e0);
position:relative;
}

/* Background Glow */

body::before{
content:"";
position:absolute;
width:300px;
height:300px;
background:#ffffff55;
filter:blur(130px);
top:-120px;
left:-120px;
animation:move1 8s infinite alternate;
}

body::after{
content:"";
position:absolute;
width:300px;
height:300px;
background:#ff2d55;
filter:blur(130px);
bottom:-120px;
right:-120px;
animation:move2 8s infinite alternate;
}

@keyframes move1{
100%{
transform:translate(130px,120px);
}
}

@keyframes move2{
100%{
transform:translate(-130px,-120px);
}
}

/* Floating Hearts */

.heart{
position:absolute;
bottom:-40px;
font-size:25px;
animation:floatUp linear forwards;
pointer-events:none;
}

@keyframes floatUp{

0%{
transform:translateY(0) scale(.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}

}

/* Title */

.title{
position:absolute;
top:70px;
width:100%;
text-align:center;
font-size:30px;
font-weight:bold;
color:white;
text-shadow:0 0 20px white;
animation:glow 2s infinite;
}

@keyframes glow{

50%{
text-shadow:0 0 30px white;
}

}

/* Bouquet */

.bouquet{

width:300px;
max-width:85%;

cursor:pointer;

animation:bounce 2s infinite;

transition:.3s;

filter:drop-shadow(0 0 25px rgba(255,255,255,.8));

}

.bouquet:active{

transform:scale(.94);

}

@keyframes bounce{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-18px);
}

}

/* Tap Text */

.tap{

position:absolute;

bottom:80px;

width:100%;

text-align:center;

font-size:20px;

font-weight:bold;

color:white;

animation:blink 1s infinite;

}

@keyframes blink{

50%{
opacity:.4;
}

}

@media(max-width:480px){

.title{
font-size:26px;
top:60px;
}

.bouquet{
width:250px;
}

.tap{
font-size:18px;
bottom:60px;
}

}

</style>

</head>

<body>

<img src="giphy.gif" class="bouquet" onclick="openLetter()" alt="Bouquet">

<div class="tap"></div>

  <script>

// Open the Love Letter
function openLetter(){

    document.querySelector(".bouquet").style.transform="scale(1.1)";
    document.querySelector(".bouquet").style.opacity=".9";

    setTimeout(function(){

        window.location.href="message.html";

    },600);

}

// Floating Hearts
setInterval(function(){

    const heart=document.createElement("div");

    heart.className="heart";

    const hearts=["I love you love","🫶","💕","I love you so much","🤍","🖤"];

    heart.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(18+Math.random()*18)+"px";

    heart.style.animationDuration=(4+Math.random()*4)+"s";

    document.body.appendChild(heart);

    setTimeout(function(){

        heart.remove();

    },8000);

},350);

// Sparkle Effect
setInterval(function(){

    document.body.animate([
        {filter:"brightness(1)"},
        {filter:"brightness(1.08)"},
        {filter:"brightness(1)"}
    ],{
        duration:1200
    });

},5000);

</script>

</body>
</html>
