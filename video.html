<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
}

/* Background Glow */
.glow{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:.5;
animation:float 10s ease-in-out infinite alternate;
}

.glow1{
width:320px;
height:320px;
background:#ffffff;
top:-100px;
left:-80px;
}

.glow2{
width:350px;
height:350px;
background:#d8b07a;
bottom:-120px;
right:-80px;
animation-delay:2s;
}

@keyframes float{
100%{
transform:translate(80px,-60px) scale(1.2);
}
}

/* Curved Lines */
.curve{
position:absolute;
border:2px solid rgba(255,255,255,.18);
border-radius:50%;
}

.c1{
width:700px;
height:700px;
top:-250px;
left:-250px;
transform:rotate(25deg);
}

.c2{
width:900px;
height:900px;
bottom:-350px;
right:-350px;
border-color:rgba(216,176,122,.22);
transform:rotate(-20deg);
}

.c3{
width:500px;
height:500px;
top:45%;
left:55%;
transform:translate(-50%,-50%) rotate(45deg);
border-color:rgba(255,255,255,.12);
}

/* Video */
video{
position:relative;
z-index:2;
width:90%;
max-width:420px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,255,255,.12);
}

.title{
position:absolute;
top:30px;
width:100%;
text-align:center;
color:#fff;
font-size:30px;
font-weight:bold;
letter-spacing:2px;
z-index:2;
text-shadow:0 0 15px rgba(255,255,255,.5);
}
</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="curve c1"></div>
<div class="curve c2"></div>
<div class="curve c3"></div>

<div class="title"> </div>

<video autoplay controls>
    <source src="video.mp4" type="video/mp4">
</video>

</body>
</html>
