<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 4th Anniversary ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- Floating Hearts -->
<div id="hearts"></div>

<!-- Loading Screen -->
<div id="loading">
    <div class="loader">
        <h1>LOVE.exe ❤️</h1>
        <p>Initializing Love System...</p>
        <div class="loading-bar">
            <div class="progress"></div>
        </div>
    </div>
</div>

<!-- Arcade Quiz -->
<section id="quiz" class="hidden">

<div class="glass">

<h2>🎮 LOVE ARCADE 🎮</h2>

<p class="question">
Who is the most beautiful girl in the world?
</p>

<input
type="text"
id="fname"
placeholder="First Name">

<input
type="text"
id="mname"
placeholder="Middle Name">

<input
type="text"
id="lname"
placeholder="Last Name">

<button onclick="checkAnswer()">
Continue ❤️
</button>

<p id="result"></p>

</div>

</section>

<!-- Bouquet Page -->
<section id="bouquetPage" class="hidden">

<div class="glass">

<h2>Congratulations! ❤️</h2>

<p>
You unlocked the secret message.
</p>

<h3>💐 Tap the Bouquet 💐</h3>

<img
src="giphy.gif"
id="bouquet"
alt="Bouquet"
onclick="openLetter()">

</div>

</section>

<!-- Love Letter -->
<section id="letter" class="hidden">

<div class="card">

<h1>Happy 4th Anniversary ❤️</h1>

<p id="typing"></p>

</div>

</section>
<!-- Confetti -->
<div id="confetti"></div>

<!-- Background Music -->
<audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<!-- Footer -->
<footer id="footer" class="hidden">
    <p>Made with ❤️ by Jojo</p>
</footer>

<!-- JavaScript -->
<script src="script.js"></script>

</body>
</html>
