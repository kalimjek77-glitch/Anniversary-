<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Simple Question ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:#080b1a;
position:relative;
padding:20px;
}

/* Animated Background */

body::before{
content:"";
position:absolute;
width:320px;
height:320px;
background:#ff2d55;
filter:blur(160px);
top:-120px;
left:-120px;
animation:move1 8s infinite alternate;
}

body::after{
content:"";
position:absolute;
width:320px;
height:320px;
background:#6c63ff;
filter:blur(160px);
bottom:-120px;
right:-120px;
animation:move2 8s infinite alternate;
}

@keyframes move1{
100%{
transform:translate(140px,120px);
}
}

@keyframes move2{
100%{
transform:translate(-140px,-120px);
}
}

.card{

position:relative;
z-index:2;

width:100%;
max-width:380px;

padding:28px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:22px;

box-shadow:0 0 35px rgba(255,0,80,.4);

text-align:center;

animation:fade .8s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h1{

color:#ff5d8f;

font-size:30px;

margin-bottom:18px;

animation:glow 2s infinite;

}

@keyframes glow{

50%{
text-shadow:0 0 18px #ff5d8f;
}

}

.question{

font-size:18px;

color:white;

margin-bottom:20px;

line-height:1.5;

}

input{

width:100%;

padding:15px;

margin:10px 0;

border:none;

outline:none;

border-radius:14px;

background:rgba(255,255,255,.15);

color:white;

font-size:16px;

}

input::placeholder{

color:#ddd;

}

button{

width:100%;

padding:15px;

margin-top:18px;

border:none;

border-radius:35px;

font-size:18px;

font-weight:bold;

background:#ff2d55;

color:white;

cursor:pointer;

transition:.3s;

}

button:active{

transform:scale(.96);

}

#result{

margin-top:18px;

font-size:17px;

font-weight:bold;

min-height:50px;

}

@media(max-width:480px){

.card{

padding:22px;

}

h1{

font-size:26px;

}

.question{

font-size:16px;

}

input{

font-size:15px;

}

button{

font-size:16px;

}

}

</style>

</head>

<body>

<div class="card">

<h1>❤️ One Simple Question ❤️</h1>

<p class="question">
Who is the most beautiful girl in the world?
</p>

<input
id="first"
type="text"
placeholder="First Name">

<input
id="middle"
type="text"
placeholder="Middle Name">

<input
id="last"
type="text"
placeholder="Last Name">

<button onclick="checkAnswer()">
Continue ❤️
</button>

<p id="result"></p>

</div></audio>

<!-- Footer -->
<footer id="footer" class="hidden">
    <p>Made with ❤️ by Jojo</p>
</footer>

<!-- JavaScript -->
<script src="script.js"></script>

</body>
</html>
