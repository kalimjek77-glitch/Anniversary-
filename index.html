<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For you love: APRIL JOY CONTIGA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#141E30,#243B55);
overflow:hidden;
padding:20px;
position:relative;
}

/* Background Glow */

body::before{
content:"";
position:absolute;
width:280px;
height:280px;
background:#ff4d6d;
filter:blur(140px);
top:-100px;
left:-100px;
animation:move1 8s infinite alternate;
}

body::after{
content:"";
position:absolute;
width:280px;
height:280px;
background:#6c63ff;
filter:blur(140px);
bottom:-100px;
right:-100px;
animation:move2 8s infinite alternate;
}

@keyframes move1{
100%{
transform:translate(120px,120px);
}
}

@keyframes move2{
100%{
transform:translate(-120px,-120px);
}
}

.card{

position:relative;
z-index:10;

width:100%;
max-width:340px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:25px;

padding:25px;

text-align:center;

box-shadow:0 0 30px rgba(255,77,109,.35);

animation:fade .8s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h1{

color:#ff7aa2;

font-size:26px;

margin-bottom:20px;

animation:glow 2s infinite;

}

@keyframes glow{

50%{
text-shadow:0 0 20px #ff7aa2;
}

}

.question{

color:white;

font-size:18px;

line-height:1.5;

margin-bottom:20px;

}

input{

width:100%;

padding:14px;

margin:8px 0;

border:none;

outline:none;

border-radius:14px;

background:rgba(255,255,255,.15);

color:white;

font-size:16px;

}

input::placeholder{

color:#ddd;

}

button{

width:100%;

padding:15px;

margin-top:18px;

border:none;

border-radius:40px;

background:#ff4d6d;

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:active{

transform:scale(.95);

}

#result{

margin-top:18px;

font-size:16px;

font-weight:bold;

min-height:55px;

}

/* Portrait Phone */

@media(max-width:480px){

.card{
max-width:330px;
padding:22px;
}

h1{
font-size:24px;
}

.question{
font-size:16px;
}

input{
font-size:15px;
}

button{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="card">

<h1>One Simple Question </h1>

<p class="question">
Who is the most beautiful girl in the world?
</p>

<input
id="first"
type="text"
placeholder="First Name">

<input
id="middle"
type="text"
placeholder="Middle Name">

<input
id="last"
type="text"
placeholder="Last Name">

<button onclick="checkAnswer()">
Continue 
</button>

<p id="result"></p>

</div>

<script>

function checkAnswer(){

const first=document.getElementById("first").value.trim().toLowerCase();

const middle=document.getElementById("middle").value.trim().toLowerCase();

const last=document.getElementById("last").value.trim().toLowerCase();

const result=document.getElementById("result");

if(
(first==="april joy"||first==="april") &&
middle==="esperila" &&
last==="contiga"
){

result.style.color="#7CFC00";

result.innerHTML=" Correct! Tani magustuhan mo🫶";

setTimeout(function(){

window.location.href="bouquet.html";

},1500);

}else{

result.style.color="#ff6b6b";

result.innerHTML="❌ Wrong Answer!<br><br>💡 Hint: It's my beautiful girlfriend ";

}

}

</script>

</body>
</html>
