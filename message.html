<!DOCTYPE html>
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
<title>Happy 4th Anniversary ❤️</title>  

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">  

<style>  

*{  
margin:0;  
padding:0;  
box-sizing:border-box;  
font-family:'Poppins',sans-serif;  
}  

body{  
display:flex;  
justify-content:center;  
align-items:center;  
min-height:100vh;  
background:linear-gradient(135deg,#ff4d6d,#ff8fab,#ffd6e0);  
overflow:hidden;  
padding:20px;  
position:relative;  
}  

body::before{  
content:"";  
position:absolute;  
width:320px;  
height:320px;  
background:#ffffff55;  
filter:blur(140px);  
top:-120px;  
left:-120px;  
animation:move1 8s infinite alternate;  
}  

body::after{  
content:"";  
position:absolute;  
width:320px;  
height:320px;  
background:#ff5d8f;  
filter:blur(140px);  
bottom:-120px;  
right:-120px;  
animation:move2 8s infinite alternate;  
}  

@keyframes move1{  
100%{ transform:translate(120px,120px); }  
}  

@keyframes move2{  
100%{ transform:translate(-120px,-120px); }  
}  

.card{  
position:relative;  
z-index:5;  
width:100%;  
max-width:360px;  
height:780px;  
background:url("note.png") center center/cover no-repeat;  
padding:70px 40px;  
display:flex;  
flex-direction:column;  
justify-content:flex-start;  
overflow:hidden;  
}  

h1{  
font-size:24px;  
color:black;  
margin-bottom:15px;  
}  
  
#typing{
font-size:15px;
line-height:1.6;
color:black;
text-align:left;
white-space:pre-wrap;
}

#fingerWrap{  
margin-top:20px;  
display:flex;  
flex-direction:column;  
align-items:center;  
gap:8px;  
}  

.fingerprint{  
width:70px;  
height:70px;  
border-radius:50%;  
border:2px solid rgba(0,0,0,0.5);  
display:flex;  
align-items:center;  
justify-content:center;  
font-size:28px;  
cursor:pointer;  
animation:pulse 1.5s infinite;  
position:relative;  
}  

.fingerprint::before{  
content:"";  
position:absolute;  
width:100%;  
height:100%;  
border-radius:50%;  
border:2px solid rgba(0,0,0,0.2);  
animation:ring 2s infinite;  
}  

@keyframes pulse{  
0%{transform:scale(1);}  
50%{transform:scale(1.05);}  
100%{transform:scale(1);}  
}  

@keyframes ring{  
0%{transform:scale(1);opacity:1;}  
100%{transform:scale(1.8);opacity:0;}  
}  

.fp-text{  
font-size:12px;  
color:black;  
}  

.progress{  
width:120px;  
height:6px;  
background:rgba(0,0,0,0.2);  
border-radius:10px;  
overflow:hidden;  
display:none;  
}  

.progress-bar{  
width:0%;  
height:100%;  
background:black;  
transition:width 5s linear;  
}  
#content{
flex:1;
overflow-y:auto;
padding-right:5px;
}

#fingerWrap{
margin-top:20px;
display:none;
flex-direction:column;
align-items:center;
gap:8px;
padding-bottom:30px;
}
</style>  
</head>  

<body>  

<div class="card">  

<h1>❤️ Happy 4th Anniversary ❤️</h1>  
<div id="content">
  
    <p id="typing"></p>

    <div id="fingerWrap">
        <div class="fingerprint" id="finger">🫆</div>
        <div class="fp-text">Your Finger Print</div>
        <div class="progress" id="progress">
            <div class="progress-bar" id="bar"></div>
        </div>
    </div>
</div>

</div>  

<audio id="music" loop>  
<source src="My Forever Starts.mp3" type="audio/mpeg">  
</audio>  

<script>  

const message=`Dear April Joy Esperila Contiga,  

Happy 4th Anniversary, My Love! ❤️  

Four wonderful years have passed, and every moment with you has been the happiest chapter of my life.  

Thank you for staying beside me through every challenge, every success, every smile, and every tear.  

You are my greatest blessing, my best friend, my safe place, and the love of my life.  

No matter where life takes us, I promise to always choose you, respect you, support you, and love you with all my heart.  

Thank you for making my world brighter just by being in it.  

May God continue to bless our relationship and guide us as we chase our dreams together.  

Happy 4th Anniversary, Mahal.  

I love you more than words can ever express.  

Forever and Always,  

❤️ Jojo ❤️`;  

let i=0;  

function typeWriter(){  
if(i<message.length){  
document.getElementById("typing").innerHTML += message.charAt(i);  
i++;  
setTimeout(typeWriter,35);  
} else {
document.getElementById("fingerWrap").style.display="flex";
}
}  

window.onload=function(){  
typeWriter();  

const music=document.getElementById("music");  
music.play().catch(()=>{  
document.body.addEventListener("click",()=>{  
music.play();  
},{once:true});  
});  
};  

const finger=document.getElementById("finger");
const bar=document.getElementById("bar");
const progress=document.getElementById("progress");

let timer;
let holding=false;

function startHold(){
holding=true;
progress.style.display="block";
setTimeout(()=>bar.style.width="100%",50);

timer=setTimeout(()=>{
window.location.href="video.html";
},5000);
}

function cancelHold(){
if(!holding) return;
holding=false;

clearTimeout(timer);
bar.style.width="0%";
progress.style.display="none";
}

finger.addEventListener("touchstart",startHold);
finger.addEventListener("mousedown",startHold);
finger.addEventListener("touchend",cancelHold);
finger.addEventListener("mouseup",cancelHold);
finger.addEventListener("mouseleave",cancelHold);

</script>  

</body>  
</html>
